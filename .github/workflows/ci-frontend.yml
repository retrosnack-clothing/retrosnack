name: CI — Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: pnpm install --frozen-lockfile
      - run: pnpm check

  build:
    name: Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

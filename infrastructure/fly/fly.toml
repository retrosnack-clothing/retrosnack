app            = "retrosnack-api"
primary_region = "iad"

[build]
  dockerfile = "infrastructure/docker/Dockerfile"
  target     = "production"

[http_service]
  internal_port       = 80
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory   = "256mb"
  cpu_kind = "shared"
  cpus     = 1

[env]
  ENV = "production"
  PORT = "8080"

# Secrets (set via: fly secrets set KEY=value)
# DATABASE_URL
# JWT_SECRET
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# R2_ACCOUNT_ID
# R2_ACCESS_KEY_ID
# R2_SECRET_ACCESS_KEY
# R2_BUCKET_NAME
# R2_PUBLIC_URL

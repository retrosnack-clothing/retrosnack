apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: retrosnack-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/cpu-throttling: "true"
    spec:
      containerConcurrency: 250
      timeoutSeconds: 30
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/retrosnack/api:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 256Mi
          env:
            - name: ENV
              value: production
            - name: PORT
              value: "8080"
            # Secrets pulled from Secret Manager at runtime
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-url
                  key: latest
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: latest
            - name: SQUARE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: square-access-token
                  key: latest
            - name: SQUARE_LOCATION_ID
              valueFrom:
                secretKeyRef:
                  name: square-location-id
                  key: latest
            - name: SQUARE_WEBHOOK_SIG_KEY
              valueFrom:
                secretKeyRef:
                  name: square-webhook-sig-key
                  key: latest
            - name: SQUARE_WEBHOOK_NOTIF_URL
              valueFrom:
                secretKeyRef:
                  name: square-webhook-notif-url
                  key: latest
            - name: R2_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: r2-account-id
                  key: latest
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: r2-access-key-id
                  key: latest
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: r2-secret-access-key
                  key: latest
            - name: R2_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: r2-bucket-name
                  key: latest
            - name: R2_PUBLIC_URL
              valueFrom:
                secretKeyRef:
                  name: r2-public-url
                  key: latest
